# 推送 / PR：类型检查 + 测试构建 + Vitest。安装包仅在打 tag 时由 Release 工作流构建（见 release.yml）。
# Docker-Browser 暂未配置 Playwright E2E；完整 E2E 流程可参考 MCP-Browser 的 ci.yml（xvfb + test:e2e）。
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test build (Vite + Electron main/preload, mode=test)
        run: pnpm run pretest

      - name: Vitest (unit)
        run: pnpm exec vitest run --exclude test/e2e.spec.ts
