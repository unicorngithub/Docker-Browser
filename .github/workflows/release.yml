# 推送以 v 开头的 tag（如 v0.1.0）时：在 Windows / macOS 上打包并创建 GitHub Release，附件为安装包。
# 构建前会用 tag 自动写入 package.json 的 version（v0.1.0 -> 0.1.0），仓库里的 version 仅作日常开发占位即可。
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Sync package version from git tag
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: node scripts/sync-version-from-tag.mjs

      - name: Typecheck
        run: pnpm typecheck

      - name: Test build
        run: pnpm run pretest

      - name: Vitest (unit)
        run: pnpm exec vitest run --exclude test/e2e.spec.ts

      - name: Package
        run: pnpm dist

      - uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.label }}
          path: release/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: package-*
          merge-multiple: true

      # 只上传：exe / dmg / zip + 更新元数据；勿用 dist/**/*（会带上 win-unpacked 等大量文件）。
      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            dist/**/Docker-Browser_*.exe
            dist/**/Docker-Browser_*.dmg
            dist/**/Docker-Browser_*.zip
            dist/**/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
